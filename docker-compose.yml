# Staff portal (CodeIgniter) + APM (Laravel) — single web entrypoint.
#
# By default the app container talks to MySQL on the PHYSICAL HOST (or any host
# you set in .env as DB_HOST). No database container is started unless you use
# the optional bundled-mysql profile.
#
#   cp docker/compose.env.example .env
#   docker compose up -d --build
#
# Optional: run a MySQL 8 container as well (set DB_HOST=mysql in .env for the web app):
#   docker compose --profile bundled-mysql up -d --build
#
# Open: http://localhost:8080/ (staff) and http://localhost:8080/apm/

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    # Lets PHP resolve "host.docker.internal" on Linux (Docker 20.10+).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-staff_ci}
      DB_USER: ${DB_USER:-staff}
      DB_PASS: ${DB_PASS:-staff}
      APM_DB_NAME: ${APM_DB_NAME:-apm_local}

  mysql:
    profiles:
      - bundled-mysql
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PUBLISH_PORT:-33060}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-staff_ci}
      MYSQL_USER: ${MYSQL_USER:-staff}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-staff}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 35s

volumes:
  mysql_data:
