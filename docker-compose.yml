# Africa CDC CBP — unified Docker. All modules share the `staff` MySQL database.
#
#   cp docker/compose.env.example .env
#   ./docker/bootstrap.sh
#
# Optional bundled MySQL:  ./docker/bootstrap.sh --bundled-mysql

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-staff}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-}
      APM_DB_NAME: ${APM_DB_NAME:-staff}
      DOCKER_BASE_URL: ${DOCKER_BASE_URL:-http://localhost:${APP_PORT:-8080}}
      JWT_SECRET: ${JWT_SECRET:-}
      AUTO_SYNC_MODULE_ENV: ${AUTO_SYNC_MODULE_ENV:-1}
      STAFF_LEGACY_SCHEMA_SKIP: ${STAFF_LEGACY_SCHEMA_SKIP:-true}
    depends_on:
      mysql:
        condition: service_healthy
        required: false

  mysql:
    profiles:
      - bundled-mysql
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PUBLISH_PORT:-33060}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-staff}
      MYSQL_USER: ${DB_USER:-staff}
      MYSQL_PASSWORD: ${DB_PASS:-staff}
      STAFF_DB_NAME: ${DB_NAME:-staff}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  redis:
    profiles:
      - redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"

volumes:
  mysql_data:
