# Optional stack for local dev — wire via backend .env (DB_*, REDIS_*)
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
      POSTGRES_DB: helpdesk
    ports:
      - "55432:5432"
    volumes:
      - helpdesk_pg:/var/lib/postgresql/data

volumes:
  helpdesk_pg: {}
