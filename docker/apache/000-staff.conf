<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName localhost

    # CodeIgniter staff portal (repo root)
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        DirectoryIndex index.php index.html
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Laravel APM — http://localhost:8080/apm/
    Alias /apm /var/www/html/apm/public
    <Directory /var/www/html/apm/public>
        DirectoryIndex index.php index.html
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Laravel Finance (Inertia) — http://localhost:8080/finance/
    Alias /finance /var/www/html/finance/public
    <Directory /var/www/html/finance/public>
        DirectoryIndex index.php index.html
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Helpdesk SPA + Laravel API — http://localhost:8080/helpdesk/
    Alias /helpdesk /var/www/html/helpdesk
    <Directory /var/www/html/helpdesk>
        DirectoryIndex index.html
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Laravel staff-portal rewrite — http://localhost:8080/staff-portal/
    Alias /staff-portal /var/www/html/staff-portal/public
    <Directory /var/www/html/staff-portal/public>
        DirectoryIndex index.php index.html
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn
</VirtualHost>
